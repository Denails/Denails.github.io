<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="Stylesheet" href="CFG.css">

    <title>Document</title>
</head>
<body>

    <div id="Box1">

        
        <label class="Labels" for="PreLim" id="label1">Prelim</label><br>
        <input class="Inputs" id="PreLim">

        <label class="Labels" for="Midterm" id="label2">Midterm</label><br>
        <input class="Inputs" id="Midterm">

        <label class="Labels" for="Pre-Final" id="label3">Pre-Final</label><br>
        <input class="Inputs" id="Pre-Final">
        
        <label class="Labels" for="Final" id="label4">Final</label><br>
        <input class="Inputs" id="Final" placeholder="Optional">

        

        <button id="Submit">Submit</button>



            <div id="Per">
                <label  class="LabelPercent" id="PercentPrelim">%Prelim</label>
                <input class="Percent" id="Percent1">
                <label  class="LabelPercent" id="PercentMidterm">%Midterm</label>
                <input class="Percent" id="Percent2">
                <label  class="LabelPercent" id="PercentPrefinal">%Pre-Final</label>
                <input class="Percent" id="Percent3">
                <label  class="LabelPercent" id="PercentFinal">%Final</label>
                <input class="Percent" id="Percent4">Optional
            </div>
        
            <img src="Logo.png" id="logo">
    </div>

    <div class="Result">
        <h4 class="Text">Result</h4>
        <p class="Text" id="text1">Prelim:</p>
        <p class="Text" id="text2">Midterm:</p>
        <p class="Text" id="text3">Pre-Final:</p>
        <p class="Text" id="text4">Final:</p>
        <p class="Text" id="text5">Average:</p>
    </div>

    
    <script src="CFG.js"></script>

</body>
</html>
