<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Bar Graph Input</title>
</head>
<body>
    <div class="Front">
        <label for="name" id="label1"><u>Input Name Of Expense</u></label>
        <input type="text" class="box"  id="name" placeholder="Enter Expense">
        <label for="input" id="label2"><u>Enter Bar Height</u></label>
        <input type="number" class="box" id="input" placeholder="Enter amount">
        <button onclick="addBar()" class="box2">Add Bar</button>
    </div> 
    <div id="graphContainer">

        <h1 id="myH1">10%</h1>
        <h1 id="myH2">20%</h1>
        <h1 id="myH3">30%</h1>
        <h1 id="myH4">40%</h1>
        <h1 id="myH5">50%</h1>
        <h1 id="myH6">60%</h1>
        <h1 id="myH7">70%</h1>
        <h1 id="myH8">80%</h1>
        <h1 id="myH9">90%</h1>
        <h1 id="myH10">100%</h1>


        <!-- Combined container for bars and labels -->
    </div>
    
    <script src="script.js"></script>
</body>
</html>
